<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HasiiMusic Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #ffffff);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px 32px;
            overflow-x: hidden;
        }

        .player-card {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* ── Header ── */
        .header {
            font-size: 11px;
            color: var(--tg-theme-hint-color, #94a3b8);
            letter-spacing: 2.5px;
            text-transform: uppercase;
            font-weight: 700;
        }

        /* ── Thumbnail ── */
        .thumbnail-wrapper {
            position: relative;
            width: 210px;
            height: 210px;
        }

        .thumbnail {
            width: 210px;
            height: 210px;
            border-radius: 22px;
            object-fit: cover;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.55);
            display: block;
        }

        .thumbnail-ring {
            position: absolute;
            inset: -5px;
            border-radius: 27px;
            background: linear-gradient(135deg, #3b82f6 0%, #a855f7 50%, #ec4899 100%);
            z-index: -1;
        }

        .thumbnail-placeholder {
            width: 210px;
            height: 210px;
            border-radius: 22px;
            background: linear-gradient(135deg, #1e3a5f, #2d1b69);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }

        /* ── Track Info ── */
        .track-info {
            text-align: center;
            width: 100%;
            padding: 0 8px;
        }

        .track-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--tg-theme-text-color, #ffffff);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .live-badge {
            display: inline-block;
            background: #ef4444;
            color: #fff;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 1.5px;
            padding: 2px 7px;
            border-radius: 4px;
            text-transform: uppercase;
            vertical-align: middle;
            margin-left: 6px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ── Progress Bar ── */
        .progress-section {
            width: 100%;
        }

        .progress-track {
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 3px;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #a855f7);
            border-radius: 3px;
            transition: width 1s linear;
            position: relative;
            min-width: 10px;
        }

        .progress-fill::after {
            content: '';
            width: 13px;
            height: 13px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
        }

        .time-row {
            display: flex;
            justify-content: space-between;
            margin-top: 9px;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #94a3b8);
            font-variant-numeric: tabular-nums;
        }

        /* ── Control Buttons ── */
        .controls-row {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-size: 22px;
            flex: 1;
            height: 54px;
            transition: transform 0.1s ease, opacity 0.15s ease;
            user-select: none;
            -webkit-user-select: none;
        }

        .btn:active {
            transform: scale(0.90);
            opacity: 0.8;
        }

        .btn-play  { background: #22c55e; color: #fff; }
        .btn-pause { background: #3b82f6; color: #fff; }
        .btn-replay{ background: #6366f1; color: #fff; }
        .btn-skip  { background: #3b82f6; color: #fff; }
        .btn-stop  { background: #475569; color: #fff; }

        /* ── Close Button ── */
        .btn-close {
            width: 100%;
            padding: 16px;
            background: #ef4444;
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1.5px;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.1s, opacity 0.15s;
        }

        .btn-close:active {
            transform: scale(0.98);
            opacity: 0.85;
        }

        /* ── Info Popup ── */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: rgba(30, 30, 50, 0.95);
            color: #fff;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            transition: transform 0.3s ease, opacity 0.3s ease;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="player-card">
        <div class="header">▸ Now Playing</div>

        <div class="thumbnail-wrapper">
            <div class="thumbnail-ring"></div>
            <img class="thumbnail" id="thumb" src="" alt="" onerror="this.style.display='none'; document.getElementById('thumb-placeholder').style.display='flex'">
            <div class="thumbnail-placeholder" id="thumb-placeholder" style="display:none">🎵</div>
        </div>

        <div class="track-info">
            <div class="track-title" id="title">
                Loading...
                <span class="live-badge" id="live-badge" style="display:none">Live</span>
            </div>
        </div>

        <div class="progress-section">
            <div class="progress-track">
                <div class="progress-fill" id="progress" style="width: 1%"></div>
            </div>
            <div class="time-row">
                <span id="elapsed-text">0:00</span>
                <span id="duration-text">0:00</span>
            </div>
        </div>

        <div class="controls-row">
            <button class="btn btn-play"   onclick="control('resume')" title="Resume">▷</button>
            <button class="btn btn-pause"  onclick="control('pause')"  title="Pause">II</button>
            <button class="btn btn-replay" onclick="control('replay')" title="Replay">↻</button>
            <button class="btn btn-skip"   onclick="control('skip')"   title="Skip">⏭</button>
            <button class="btn btn-stop"   onclick="control('stop')"   title="Stop">■</button>
        </div>

        <button class="btn-close" onclick="closePlayer()">✕  CLOSE</button>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ── Telegram WebApp Init ──────────────────────────────────────────────
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // ── Parse URL Parameters ──────────────────────────────────────────────
        const params   = new URLSearchParams(window.location.search);
        const title    = decodeURIComponent(params.get('title')    || 'Unknown Track');
        const thumb    = decodeURIComponent(params.get('thumb')    || '');
        const durSec   = parseInt(params.get('duration') || '0',  10);
        const elapsedP = parseInt(params.get('elapsed')  || '0',  10);
        const chatId   = params.get('chat') || '';
        const botUser  = params.get('bot')  || '';
        const isLive   = params.get('live') === '1';

        // ── Populate UI ───────────────────────────────────────────────────────
        document.getElementById('title').firstChild.textContent = title + ' ';
        document.getElementById('thumb').src = thumb;
        if (isLive) document.getElementById('live-badge').style.display = 'inline-block';

        // ── Progress Tracking ─────────────────────────────────────────────────
        let elapsed = elapsedP;

        function formatTime(sec) {
            const h = Math.floor(sec / 3600);
            const m = Math.floor((sec % 3600) / 60);
            const s = Math.floor(sec % 60);
            if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            return `${m}:${String(s).padStart(2,'0')}`;
        }

        function updateProgress() {
            const pct = durSec > 0 ? Math.min((elapsed / durSec) * 100, 100) : 0;
            document.getElementById('progress').style.width   = Math.max(pct, 1) + '%';
            document.getElementById('elapsed-text').textContent = formatTime(elapsed);
            document.getElementById('duration-text').textContent = isLive
                ? '🔴 LIVE'
                : formatTime(durSec);
        }

        updateProgress();

        const ticker = setInterval(() => {
            if (!isLive && durSec > 0 && elapsed < durSec) {
                elapsed++;
                updateProgress();
            }
        }, 1000);

        // ── Toast Notification ────────────────────────────────────────────────
        function showToast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2200);
        }

        // ── Control Actions ───────────────────────────────────────────────────
        const actionLabels = {
            resume: '▶ Resuming...',
            pause:  '⏸ Pausing...',
            replay: '↻ Replaying...',
            skip:   '⏭ Skipping...',
            stop:   '⏹ Stopping...',
        };

        function control(action) {
            if (!botUser || !chatId) {
                showToast('⚠️ Could not identify chat');
                return;
            }
            showToast(actionLabels[action] || '...');
            const startParam = `ctrl_${action}_${chatId}`;
            const url = `https://t.me/${botUser}?start=${startParam}`;
            setTimeout(() => {
                if (tg) {
                    tg.openTelegramLink(url);
                } else {
                    window.open(url, '_blank');
                }
            }, 400);
        }

        function closePlayer() {
            clearInterval(ticker);
            if (tg) tg.close();
        }
    </script>
</body>
</html>
